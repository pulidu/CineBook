<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Payment Failed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-card {
            background: #1e293b;
            border-radius: 2rem;
            padding: 3rem;
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .error-icon {
            width: 100px;
            height: 100px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-times-circle"></i>
        </div>
        <h2 class="mb-3">Payment Cancelled</h2>
        <p class="text-white-50">The payment process was cancelled or failed. Your seats have not been booked.</p>
        <div class="mt-4">
            <a href="booking.html" id="retryBtn" class="btn btn-primary">Try Again</a>
            <a href="dashboard.html" class="btn btn-outline-primary ms-2">Back to Dashboard</a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
    const bookingId = getUrlParam('bookingId');
    if (bookingId) {
        $('#retryBtn').attr('href', 'booking.html?bookingId=' + bookingId);
    }
</script>
</body>
</html>
