spring.application.name=CineBook

server.port=8080

# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/cinebook_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.hikari.maximum-pool-size=10

#JPA Configurations
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
jwt.secret=yourSecretKeyForJWTTokenGenerationAndValidation2025CineBook
jwt.expiration=86400000

# Email Configuration (for Forgot Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=testprojects58@gmail.com
spring.mail.password=ebvp cizo yikz ghmf
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# PayPal Configuration
paypal.client.id=${PAYPAL_CLIENT_ID:YOUR_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:YOUR_CLIENT_SECRET}
paypal.mode=sandbox

# Logging
logging.level.org.springframework.security=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=./uploads

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:./uploads/