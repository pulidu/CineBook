<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Payment Records</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .payment-table-container {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .table { color: white; }
        .table thead th { border-bottom: 2px solid var(--gray); color: #94a3b8; font-weight: 600; }
        .table tbody td { border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; padding: 1rem 0.75rem; }
        .payment-method { display: flex; align-items: center; gap: 0.5rem; }
        .method-paypal { color: #003087; }
        .method-card { color: #f97316; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3 class="gradient-text"><i class="fas fa-crown me-2"></i>ADMIN PANEL</h3>
        </div>

        <ul class="list-unstyled components">
            <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Overview</a></li>
            <li><a href="manage-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> Manage Movies</a></li>
            <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> All Bookings</a></li>
            <li class="active"><a href="payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="logout-btn text-danger text-decoration-none">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <button type="button" id="sidebarCollapse" class="btn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="display-6 fw-bold">Payment Records</h1>
                    <p class="text-white-50">Transaction history and revenue tracking</p>
                </div>
                <div class="stat-card px-4 py-2">
                    <div class="text-white-50 small">Total Revenue</div>
                    <div class="h4 mb-0 text-success" id="totalRevenue">LKR 0</div>
                </div>
            </div>

            <div class="payment-table-container" data-aos="fade-up">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Booking Ref</th>
                                <th>Method</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="paymentTableBody">
                            <!-- Payments will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script>

<script>
    AOS.init({ duration: 800, once: true });

    function loadPayments() {
        showSpinner();
        API.admin.getPayments(function(error, payments) {
            hideSpinner();
            if (error) {
                showToast('Failed to load payments', 'error');
                return;
            }

            let total = 0;
            const body = $('#paymentTableBody');
            body.empty();

            payments.sort((a,b) => new Date(b.paymentDate) - new Date(a.paymentDate)).forEach(p => {
                total += p.amount;
                const methodIcon = p.paymentMethod === 'PAYPAL' ? 'fab fa-cc-paypal method-paypal' : 'fas fa-credit-card method-card';
                
                body.append(`
                    <tr>
                        <td><code class="text-primary">${p.transactionId}</code></td>
                        <td><a href="my-bookings.html?ref=${p.bookingReference}" class="text-decoration-none">${p.bookingReference}</a></td>
                        <td>
                            <div class="payment-method">
                                <i class="${methodIcon}"></i>
                                <span>${p.paymentMethod}</span>
                            </div>
                        </td>
                        <td class="fw-bold">${formatCurrency(p.amount)}</td>
                        <td>${formatDate(p.paymentDate)}</td>
                        <td><span class="badge bg-success">COMPLETED</span></td>
                    </tr>
                `);
            });

            $('#totalRevenue').text(formatCurrency(total));
        });
    }

    $(document).ready(function() {
        loadPayments();
    });
</script>
</body>
</html>
