<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Payment Success</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-card {
            background: #1e293b;
            border-radius: 2rem;
            padding: 3rem;
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            border: 1px solid rgba(34, 197, 94, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="success-card" id="statusCard">
        <div class="success-icon">
            <i class="fas fa-spinner fa-spin"></i>
        </div>
        <h2 class="mb-3">Processing Payment...</h2>
        <p class="text-white-50">Please do not close or refresh this page while we finalize your booking.</p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>

<script>
    const bookingId = getUrlParam('bookingId');
    const orderId = getUrlParam('token'); // PayPal PayerID/Token is called 'token' in return URL

    if (!bookingId || !orderId) {
        window.location.href = 'dashboard.html';
    } else {
        // Capture PayPal Order
        $.ajax({
            url: API_BASE + '/api/bookings/' + bookingId + '/paypal/capture?orderId=' + orderId,
            type: 'POST',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
            success: function(response) {
                if (response.paymentStatus === 'SUCCESS') {
                    $('#statusCard').html(`
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h2 class="mb-3">Payment Successful!</h2>
                        <p class="text-white-50">Your seats have been booked. A confirmation email has been sent to you.</p>
                        <div class="mt-4 d-flex gap-2 justify-content-center">
                            <a href="my-bookings.html" class="btn btn-primary">View My Bookings</a>
                            <a href="dashboard.html" class="btn btn-outline-primary">Go to Dashboard</a>
                        </div>
                    `);
                } else {
                    handleFailure(response.message || 'Payment capture failed');
                }
            },
            error: function(xhr) {
                const err = xhr.responseJSON || { message: 'An error occurred during payment capture' };
                handleFailure(err.message);
            }
        });
    }

    function handleFailure(msg) {
        $('#statusCard').html(`
            <div class="success-icon" style="background: rgba(239, 68, 68, 0.2); color: #ef4444;">
                <i class="fas fa-times-circle"></i>
            </div>
            <h2 class="mb-3">Payment Failed</h2>
            <p class="text-white-50">${msg}</p>
            <div class="mt-4">
                <a href="booking.html" class="btn btn-primary">Try Again</a>
            </div>
        `);
    }
</script>
</body>
</html>
