<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-card {
            max-width: 450px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg py-3">
    <div class="container">
        <a class="navbar-brand" href="index.html" style="color:#f97316;">
            <i class="fas fa-film me-2"></i>CINE BOOK</a>
        <div class="ms-auto d-flex gap-2" id="navButtons"></div>
    </div>
</nav>

<div class="container py-5">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-sign-in-alt"></i></div>
        <h2 class="text-center gradient-text">Welcome Back</h2>
        <p class="text-center text-white-50 mb-4">Sign in to continue your movie journey</p>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3" id="loginBtn">
                <span id="btnText">Sign In</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>
        </form>

        <p class="text-center mt-4 mb-0">Don't have an account? <a href="register.html" class="text-primary">Register Now</a></p>
    </div>
</div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>

<script>
    $('#loginForm').on('submit', function(e) {
        e.preventDefault();

        const email = $('#email').val();
        const password = $('#password').val();

        if (!email || !password) {
            showToast('Please fill all fields', 'warning');
            return;
        }

        $('#btnText').addClass('d-none');
        $('#btnSpinner').removeClass('d-none');
        $('#loginBtn').prop('disabled', true);

        API.auth.login({ email, password }, function(error, result) {
            $('#btnText').removeClass('d-none');
            $('#btnSpinner').addClass('d-none');
            $('#loginBtn').prop('disabled', false);

            if (error) {
                showToast(error.message || 'Invalid credentials', 'error');
            } else {
                showToast('Welcome back, ' + result.name + '!', 'success');
                setTimeout(() => {
                    window.location.href = result.role === 'ADMIN' ? 'admin-dashboard.html' : 'dashboard.html';
                }, 1500);
            }
        });
    });
</script>
</body>
</html>
