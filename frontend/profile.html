<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - My Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .profile-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 1.5rem; padding: 2rem; margin-bottom: 2rem; }
        .profile-avatar { width: 120px; height: 120px; background: linear-gradient(135deg, #f97316, #dc2626); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 3rem; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3 class="gradient-text"><i class="fas fa-film me-2"></i>CINEBOOK</h3>
        </div>

        <ul class="list-unstyled components" id="sidebarMenu">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> Movies</a></li>
            <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> My Bookings</a></li>
            <li><a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li><a href="feedback.html"><i class="fas fa-star"></i> Feedback</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="logout-btn text-danger text-decoration-none">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <button type="button" id="sidebarCollapse" class="btn">
            <i class="fas fa-bars"></i>
        </button>

        <nav class="navbar navbar-expand-lg py-3 d-md-none">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html" style="color:#f97316;">
                    <i class="fas fa-film me-2"></i>CINE BOOK</a>
            </div>
        </nav>

        <div class="container py-4">
    <div class="row"><div class="col-lg-6 mx-auto"><div class="profile-card"><div class="profile-avatar" id="userAvatar">JD</div><h2 class="text-center" id="profileName">John Doe</h2><p class="text-center text-white-50" id="profileEmail">john@example.com</p><p class="text-center"><span class="badge bg-primary" id="profileRole">CUSTOMER</span></p><hr><div class="row text-center"><div class="col-4"><h4 id="totalBookings">0</h4><small class="text-white-50">Bookings</small></div><div class="col-4"><h4 id="totalSpent">LKR 0</h4><small class="text-white-50">Spent</small></div><div class="col-4"><h4 id="avgRating">0</h4><small class="text-white-50">Avg Rating</small></div></div></div>
        <div class="card p-4"><h5><i class="fas fa-lock text-primary me-2"></i>Change Password</h5><form id="changePasswordForm"><div class="mb-3"><label>Current Password</label><input type="password" id="currentPassword" class="form-control" required></div><div class="mb-3"><label>New Password</label><input type="password" id="newPassword" class="form-control" required minlength="6"></div><div class="mb-3"><label>Confirm Password</label><input type="password" id="confirmPassword" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Update Password</button></form></div>
        <div class="text-center mt-4"><button class="btn btn-outline-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</button></div>
    </div></div>
</div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script>
<script>
    // Adjust sidebar based on role
    $(document).ready(function() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'ADMIN') {
            $('#sidebar .sidebar-header h3').html('<i class="fas fa-crown me-2"></i>ADMIN PANEL');
            $('#sidebarMenu').html(`
                <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Overview</a></li>
                <li><a href="manage-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                <li><a href="movies.html"><i class="fas fa-film"></i> Manage Movies</a></li>
                <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> All Bookings</a></li>
                <li><a href="payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a></li>
            `);
        }
    });
</script>

<script>
    const user = getUser();
    if (!user.name) { window.location.href = 'login.html'; }

    $('#userAvatar').text(user.name.split(' ').map(n=>n[0]).join('').toUpperCase());
    $('#profileName').text(user.name);
    $('#profileEmail').text(user.email);
    $('#profileRole').text(user.role);

    API.bookings.getUserBookings(function(error, bookings) {
        if (!error) {
            let total = 0;
            bookings.forEach(b => { if (b.status === 'CONFIRMED') total += b.totalAmount; });
            $('#totalBookings').text(bookings.length);
            $('#totalSpent').text(formatCurrency(total));
        }
    });

    $('#changePasswordForm').on('submit', function(e) {
        e.preventDefault();
        let current = $('#currentPassword').val(), newPwd = $('#newPassword').val(), confirm = $('#confirmPassword').val();
        if (!current || !newPwd) { showToast('Please fill all fields', 'warning'); return; }
        if (newPwd !== confirm) { showToast('New passwords do not match', 'warning'); return; }
        if (newPwd.length < 6) { showToast('Password must be at least 6 characters', 'warning'); return; }
        showToast('Password updated successfully!', 'success');
        $('#changePasswordForm')[0].reset();
    });
</script>
</body>
</html>
