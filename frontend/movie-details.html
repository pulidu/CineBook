<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Movie Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .movie-hero { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 1.5rem; padding: 2rem; margin-bottom: 2rem; }
        .movie-poster-large { width: 100%; max-width: 280px; border-radius: 1rem; background: #334155; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .show-card { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; transition: all 0.3s ease; cursor: pointer; }
        .show-card:hover { background: #2d3a4e; transform: translateX(5px); }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .info-item { background: rgba(255,255,255,0.05); padding: 0.75rem; border-radius: 0.75rem; text-align: center; }
        .trailer-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .trailer-modal.active { display: flex; }
        .trailer-container { position: relative; width: 80%; max-width: 800px; }
        .close-trailer { position: absolute; top: -40px; right: 0; color: white; font-size: 2rem; cursor: pointer; }
        .trailer-container iframe { width: 100%; aspect-ratio: 16/9; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg py-3">
    <div class="container">
        <a class="navbar-brand" href="index.html" style="color:#f97316;">
            <i class="fas fa-film me-2"></i>CINE BOOK</a>
        <div class="ms-auto d-flex gap-2" id="navButtons"></div>
    </div>
</nav>

<div class="container py-4" id="movieContent"><div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-white-50">Loading movie details...</p></div></div>

<div id="trailerModal" class="trailer-modal"><div class="trailer-container"><i class="fas fa-times close-trailer" onclick="closeTrailer()"></i><iframe id="trailerIframe" src="" frameborder="0" allowfullscreen></iframe></div></div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>

<script>
    const movieId = getUrlParam('id');

    function openTrailer(url) {
        let videoId = '';
        if (url.includes('youtube.com/watch?v=')) videoId = url.split('v=')[1].split('&')[0];
        else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
        if (videoId) { $('#trailerIframe').attr('src', `https://www.youtube.com/embed/${videoId}?autoplay=1`); $('#trailerModal').addClass('active'); }
        else window.open(url, '_blank');
    }

    function closeTrailer() { $('#trailerIframe').attr('src', ''); $('#trailerModal').removeClass('active'); }

    function bookShow(showId) {
        if (!isLoggedIn()) { showToast('Please login to book tickets', 'warning'); setTimeout(() => { window.location.href = 'login.html'; }, 1000); return; }
        window.location.href = `booking.html?showId=${showId}&movieId=${movieId}`;
    }

    function loadMovie() {
        API.movies.getById(movieId, function(error, movie) {
            if (error) { $('#movieContent').html('<div class="text-center text-danger">Failed to load movie</div>'); return; }
            API.shows.getByMovie(movieId, function(err, shows) {
                $('#movieContent').html(`
                    <div class="movie-hero"><div class="row"><div class="col-md-3 text-center"><div class="movie-poster-large">${movie.posterUrl ? `<img src="${movie.posterUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:1rem;">` : `<i class="fas fa-film" style="font-size:5rem;color:#f97316;"></i>`}</div></div>
                    <div class="col-md-9"><h1 class="display-4 fw-bold">${escapeHtml(movie.title)}</h1><div class="text-warning mb-3">${renderStars(movie.rating || 0)} <span class="text-white-50">(${movie.rating || '0'}/5)</span></div>
                    <p class="text-white-50">${movie.description || 'No description available'}</p><div class="info-grid"><div class="info-item"><i class="fas fa-clock text-primary"></i><div class="text-white fw-bold">${movie.duration} min</div><small>Duration</small></div>
                    <div class="info-item"><i class="fas fa-tag text-primary"></i><div class="text-white fw-bold">${movie.genre || 'N/A'}</div><small>Genre</small></div>
                    <div class="info-item"><i class="fas fa-language text-primary"></i><div class="text-white fw-bold">${movie.language || 'English'}</div><small>Language</small></div>
                    <div class="info-item"><i class="fas fa-calendar text-primary"></i><div class="text-white fw-bold">${movie.releaseDate ? formatDate(movie.releaseDate) : 'Coming Soon'}</div><small>Release</small></div></div>
                    ${movie.trailerUrl ? `<button class="btn btn-outline-primary mt-3" onclick="openTrailer('${movie.trailerUrl}')"><i class="fas fa-play me-2"></i>Watch Trailer</button>` : ''}</div></div></div>
                    <h3 class="mb-3"><i class="fas fa-calendar-alt text-primary me-2"></i>Available Shows</h3>
                    ${shows?.length ? shows.map(s => `<div class="show-card" onclick="bookShow(${s.id})"><div class="row align-items-center"><div class="col-md-3"><i class="fas fa-calendar-alt text-primary"></i> ${formatDate(s.showDate)}</div>
                    <div class="col-md-2"><i class="fas fa-clock text-primary"></i> ${s.showTime}</div><div class="col-md-2"><i class="fas fa-tag text-primary"></i> <span class="text-success fw-bold">${formatCurrency(s.price)}</span></div>
                    <div class="col-md-3"><i class="fas fa-chair text-primary"></i> ${s.availableSeats} / ${s.totalSeats} seats available</div>
                    <div class="col-md-2 text-end"><button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); bookShow(${s.id})"><i class="fas fa-ticket-alt"></i> Book Now</button></div></div></div>`).join('') : '<div class="text-center py-5"><i class="fas fa-calendar-times fa-3x"></i><h5 class="mt-3">No shows available</h5></div>'}
                `);
            });
        });
    }

    loadMovie();
</script>
</body>
</html>
