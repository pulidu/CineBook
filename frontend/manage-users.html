<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Manage Users</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .user-table-container {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .table { color: white; }
        .table thead th { border-bottom: 2px solid var(--gray); color: #94a3b8; font-weight: 600; }
        .table tbody td { border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; padding: 1rem 0.75rem; }
        .role-badge { padding: 0.35rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .role-admin { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid #f59e0b; }
        .role-customer { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gray); display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3 class="gradient-text"><i class="fas fa-crown me-2"></i>ADMIN PANEL</h3>
        </div>

        <ul class="list-unstyled components">
            <li>
                <a href="admin-dashboard.html">
                    <i class="fas fa-chart-line"></i> Overview
                </a>
            </li>
            <li class="active">
                <a href="manage-users.html">
                    <i class="fas fa-users"></i> Manage Users
                </a>
            </li>
            <li>
                <a href="movies.html">
                    <i class="fas fa-film"></i> Manage Movies
                </a>
            </li>
            <li>
                <a href="my-bookings.html">
                    <i class="fas fa-ticket-alt"></i> All Bookings
                </a>
            </li>
            <li>
                <a href="payments.html">
                    <i class="fas fa-money-bill-wave"></i> Payments
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="logout-btn text-danger text-decoration-none">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <button type="button" id="sidebarCollapse" class="btn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="display-6 fw-bold">Manage Users</h1>
                    <p class="text-white-50">View all registered users and manage their access levels</p>
                </div>
                <div class="stat-card px-4 py-2">
                    <div class="text-white-50 small">Total Users</div>
                    <div class="h4 mb-0 text-primary" id="userCount">0</div>
                </div>
            </div>

            <div class="user-table-container" data-aos="fade-up">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Registered Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- Users will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script>

<script>
    AOS.init({ duration: 800, once: true });

    function loadUsers() {
        showSpinner();
        // Check if API.admin.getUsers exists, if not we might need to add it to api.js
        if (!API.admin.getUsers) {
            API.admin.getUsers = function(callback) {
                $.ajax({
                    url: API_BASE + '/api/admin/users',
                    type: 'GET',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    success: function(response) { if (callback) callback(null, response); },
                    error: function(xhr) { if (callback) callback(xhr.responseJSON, null); }
                });
            };
        }

        if (!API.admin.updateRole) {
            API.admin.updateRole = function(id, role, callback) {
                $.ajax({
                    url: API_BASE + '/api/admin/users/' + id + '/role?role=' + role,
                    type: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    success: function(response) { if (callback) callback(null, response); },
                    error: function(xhr) { if (callback) callback(xhr.responseJSON, null); }
                });
            };
        }

        API.admin.getUsers(function(error, users) {
            hideSpinner();
            if (error) {
                showToast('Failed to load users', 'error');
                return;
            }

            $('#userCount').text(users.length);
            const body = $('#userTableBody');
            body.empty();

            users.forEach(user => {
                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                const roleClass = user.role === 'ADMIN' ? 'role-admin' : 'role-customer';
                
                body.append(`
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="user-avatar">${initials}</div>
                                <div>
                                    <div class="fw-bold">${escapeHtml(user.name)}</div>
                                    <small class="text-white-50">ID: #${user.id}</small>
                                </div>
                            </div>
                        </td>
                        <td>${escapeHtml(user.email)}</td>
                        <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                        <td>${user.registeredAt || 'N/A'}</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    Change Role
                                </button>
                                <ul class="dropdown-menu dropdown-menu-dark">
                                    <li><a class="dropdown-item" href="#" onclick="changeRole(${user.id}, 'ADMIN')">Set as ADMIN</a></li>
                                    <li><a class="dropdown-item" href="#" onclick="changeRole(${user.id}, 'CUSTOMER')">Set as CUSTOMER</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                `);
            });
        });
    }

    function changeRole(userId, role) {
        showSpinner();
        API.admin.updateRole(userId, role, function(error) {
            hideSpinner();
            if (error) {
                showToast(error.message || 'Failed to update role', 'error');
            } else {
                showToast('User role updated successfully', 'success');
                loadUsers();
            }
        });
    }

    $(document).ready(function() {
        loadUsers();
    });
</script>
</body>
</html>
