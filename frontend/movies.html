<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Movies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .movie-card { background: #1e293b; border-radius: 1rem; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .movie-poster { height: 300px; background: linear-gradient(135deg, #334155, #1e293b); display: flex; align-items: center; justify-content: center; position: relative; }
        .movie-rating { position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.7); padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.875rem; color: #fbbf24; }
        .search-section { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 2rem; }
        .filter-chip { display: inline-flex; padding: 0.5rem 1rem; background: #334155; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        .filter-chip.active, .filter-chip:hover { background: #f97316; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3 class="gradient-text"><i class="fas fa-film me-2"></i>CINEBOOK</h3>
        </div>

        <ul class="list-unstyled components" id="sidebarMenu">
            <!-- Dynamic menu based on role will be handled by sidebar.js if we wanted to, but for now fixed -->
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> Movies</a></li>
            <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> My Bookings</a></li>
            <li><a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li><a href="feedback.html"><i class="fas fa-star"></i> Feedback</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="logout-btn text-danger text-decoration-none">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <button type="button" id="sidebarCollapse" class="btn">
            <i class="fas fa-bars"></i>
        </button>

        <nav class="navbar navbar-expand-lg py-3 d-md-none">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html" style="color:#f97316;">
                    <i class="fas fa-film me-2"></i>CINE BOOK</a>
            </div>
        </nav>

        <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h1 class="display-5 fw-bold"><i class="fas fa-film me-2 text-primary"></i>All Movies</h1><p class="text-white-50">Discover the latest releases and book your tickets</p></div>
    </div>

    <div class="search-section">
        <div class="row g-3">
            <div class="col-md-6"><div class="input-group"><span class="input-group-text bg-dark border-secondary"><i class="fas fa-search text-primary"></i></span><input type="text" id="searchInput" class="form-control" placeholder="Search by movie title..."></div></div>
            <div class="col-md-6"><div class="d-flex flex-wrap gap-2"><div class="filter-chip active" data-filter="all">All Movies</div><div class="filter-chip" data-filter="now-showing">Now Showing</div><div class="filter-chip" data-filter="popular">Popular</div></div></div>
        </div>
    </div>

    <div class="row g-4" id="moviesContainer"><div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-white-50">Loading movies...</p></div></div>
</div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script>
<script>
    // Adjust sidebar based on role
    $(document).ready(function() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'ADMIN') {
            $('#sidebar .sidebar-header h3').html('<i class="fas fa-crown me-2"></i>ADMIN PANEL');
            $('#sidebarMenu').html(`
                <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Overview</a></li>
                <li><a href="manage-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                <li><a href="movies.html"><i class="fas fa-film"></i> Manage Movies</a></li>
                <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> All Bookings</a></li>
                <li><a href="payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a></li>
            `);
        }
    });
</script>

<script>
    let allMovies = [], currentFilter = 'all', searchTerm = '';

    function loadMovies() {
        API.movies.getAll(function(error, movies) {
            if (error) { $('#moviesContainer').html('<div class="col-12 text-center text-danger">Failed to load movies</div>'); return; }
            allMovies = movies;
            filterAndDisplay();
        });
    }

    function filterAndDisplay() {
        let filtered = [...allMovies];
        if (searchTerm) filtered = filtered.filter(m => m.title.toLowerCase().includes(searchTerm.toLowerCase()));
        if (currentFilter === 'now-showing') filtered = filtered.filter(m => m.releaseDate && new Date(m.releaseDate) <= new Date());
        else if (currentFilter === 'popular') filtered = filtered.sort((a,b) => (b.popularityScore || 0) - (a.popularityScore || 0));
        displayMovies(filtered);
    }

    function displayMovies(movies) {
        if (movies.length === 0) { $('#moviesContainer').html('<div class="col-12 text-center text-white-50 py-5"><i class="fas fa-film fa-3x mb-3"></i><h5>No movies found</h5></div>'); return; }
        $('#moviesContainer').html(movies.map(m => `
            <div class="col-md-3"><div class="movie-card" onclick="viewMovie(${m.id})"><div class="movie-poster">${m.posterUrl ? `<img src="${m.posterUrl}" style="width:100%;height:100%;object-fit:cover;">` : `<i class="fas fa-film" style="font-size:4rem;color:#f97316;"></i>`}<div class="movie-rating"><i class="fas fa-star text-warning"></i> ${m.rating || 'New'}</div></div>
            <div class="p-3"><h5 class="text-white">${escapeHtml(m.title)}</h5><p class="text-white-50 small">${m.duration} min • ${m.genre || 'Action'}</p><div class="d-flex justify-content-between"><span class="small text-white-50"><i class="fas fa-ticket-alt"></i> ${m.totalBookings || 0} bookings</span><button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); bookMovie(${m.id})">Book Now</button></div></div></div></div>
        `).join(''));
    }

    function viewMovie(id) { window.location.href = `movie-details.html?id=${id}`; }
    function bookMovie(id) { if (!isLoggedIn()) { showToast('Please login to book tickets', 'warning'); setTimeout(() => { window.location.href = 'login.html'; }, 1000); } else { window.location.href = `movie-details.html?id=${id}`; } }

    $('#searchInput').on('input', function() { searchTerm = $(this).val(); filterAndDisplay(); });
    $('.filter-chip').on('click', function() { $('.filter-chip').removeClass('active'); $(this).addClass('active'); currentFilter = $(this).data('filter'); filterAndDisplay(); });

    loadMovies();
</script>
</body>
</html>
