<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-card {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .register-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: white;
        }
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .role-option {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            background: #334155;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .role-option.selected {
            background: linear-gradient(95deg, #f97316, #dc2626);
            border-color: white;
        }
        .role-option i { font-size: 1.25rem; margin-bottom: 0.25rem; display: block; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg py-3">
    <div class="container">
        <a class="navbar-brand" href="index.html" style="color:#f97316;">
   <i class="fas fa-film me-2"></i>CINE BOOK</a>
        <div class="ms-auto d-flex gap-2" id="navButtons"></div>
    </div>
</nav>

<div class="container py-5">
    <div class="register-card">
        <div class="register-icon"><i class="fas fa-user-plus"></i></div>
        <h2 class="text-center gradient-text">Create Account</h2>
        <p class="text-center text-white-50 mb-4">Join the ultimate movie experience</p>

        <div class="role-selector">
            <div class="role-option selected" data-role="CUSTOMER">
                <i class="fas fa-user"></i>Customer
            </div>
            <div class="role-option" data-role="ADMIN">
                <i class="fas fa-crown"></i>Admin
            </div>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a password (min 6 characters)" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3" id="registerBtn">
                <span id="btnText">Create Account</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>
        </form>

        <p class="text-center mt-4 mb-0">Already have an account? <a href="login.html" class="text-primary">Sign In</a></p>
    </div>
</div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>

<script>
    let selectedRole = 'CUSTOMER';

    $('.role-option').on('click', function() {
        $('.role-option').removeClass('selected');
        $(this).addClass('selected');
        selectedRole = $(this).data('role');
    });

    $('#registerForm').on('submit', function(e) {
        e.preventDefault();

        const name = $('#name').val();
        const email = $('#email').val();
        const password = $('#password').val();

        if (!name || !email || !password) {
            showToast('Please fill all fields', 'warning');
            return;
        }

        if (password.length < 6) {
            showToast('Password must be at least 6 characters', 'warning');
            return;
        }

        $('#btnText').addClass('d-none');
        $('#btnSpinner').removeClass('d-none');
        $('#registerBtn').prop('disabled', true);

        API.auth.register({ name, email, password, role: selectedRole }, function(error, result) {
            $('#btnText').removeClass('d-none');
            $('#btnSpinner').addClass('d-none');
            $('#registerBtn').prop('disabled', false);

            if (error) {
                showToast(error.message || 'Registration failed', 'error');
            } else {
                showToast('Welcome to CineBook, ' + result.name + '!', 'success');
                setTimeout(() => {
                    window.location.href = result.role === 'ADMIN' ? 'admin-dashboard.html' : 'dashboard.html';
                }, 1500);
            }
        });
    });
</script>
</body>
</html>
