<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook - My Bookings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .booking-card { background: #1e293b; border-radius: 1rem; margin-bottom: 1rem; overflow: hidden; transition: all 0.3s ease; }
        .booking-card:hover { transform: translateX(5px); background: #2d3a4e; }
        .booking-header { background: rgba(0,0,0,0.2); padding: 1rem; border-bottom: 1px solid #334155; }
        .booking-body { padding: 1rem; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .status-confirmed { background: #22c55e; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .filter-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .filter-btn { padding: 0.5rem 1rem; border-radius: 50px; background: #334155; color: white; cursor: pointer; transition: all 0.3s ease; }
        .filter-btn.active, .filter-btn:hover { background: #f97316; }
        .qr-modal-img { max-width: 250px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3 class="gradient-text"><i class="fas fa-film me-2"></i>CINEBOOK</h3>
        </div>

        <ul class="list-unstyled components" id="sidebarMenu">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="movies.html"><i class="fas fa-film"></i> Movies</a></li>
            <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> My Bookings</a></li>
            <li><a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li><a href="feedback.html"><i class="fas fa-star"></i> Feedback</a></li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="logout-btn text-danger text-decoration-none">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content">
        <button type="button" id="sidebarCollapse" class="btn">
            <i class="fas fa-bars"></i>
        </button>

        <nav class="navbar navbar-expand-lg py-3 d-md-none">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html" style="color:#f97316;">
                    <i class="fas fa-film me-2"></i>CINE BOOK</a>
            </div>
        </nav>

        <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4"><div><h1 class="display-5 fw-bold"><i class="fas fa-ticket-alt me-2 text-primary"></i>My Bookings</h1><p class="text-white-50">View and manage your movie tickets</p></div><a href="movies.html" class="btn btn-primary"><i class="fas fa-plus me-2"></i>Book More</a></div>
    <div class="filter-buttons"><div class="filter-btn active" data-filter="all">All</div><div class="filter-btn" data-filter="CONFIRMED">Confirmed</div><div class="filter-btn" data-filter="CANCELLED">Cancelled</div><div class="filter-btn" data-filter="upcoming">Upcoming</div><div class="filter-btn" data-filter="past">Past</div></div>
    <div id="bookingsList"><div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2">Loading your bookings...</p></div></div>
</div>

<div class="modal fade" id="qrModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-dark"><div class="modal-header"><h5><i class="fas fa-qrcode me-2 text-primary"></i>Your Ticket</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><img id="qrImage" class="qr-modal-img mb-3"><p id="qrRef" class="text-white-50 mb-2"></p><hr><div class="text-start small"><p><strong>Movie:</strong> <span id="qrMovie"></span></p><p><strong>Date:</strong> <span id="qrDate"></span></p><p><strong>Time:</strong> <span id="qrTime"></span></p><p><strong>Seats:</strong> <span id="qrSeats"></span></p></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print me-2"></i>Print</button></div></div></div></div>

<div class="toast-container"></div>
<div id="loadingSpinner" class="spinner-overlay"><div class="spinner"></div></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</div>
</div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script>
<script>
    // Adjust sidebar based on role
    $(document).ready(function() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.role === 'ADMIN') {
            $('#sidebar .sidebar-header h3').html('<i class="fas fa-crown me-2"></i>ADMIN PANEL');
            $('#sidebarMenu').html(`
                <li><a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Overview</a></li>
                <li><a href="manage-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
                <li><a href="movies.html"><i class="fas fa-film"></i> Manage Movies</a></li>
                <li><a href="my-bookings.html"><i class="fas fa-ticket-alt"></i> All Bookings</a></li>
                <li><a href="payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a></li>
            `);
        }
    });
</script>

<script>
    const ref = getUrlParam('ref');
    let allBookings = [], currentFilter = 'all';

    function loadBookings() {
        if (ref) {
            API.bookings.getByReference(ref, function(error, booking) {
                if (!error) allBookings = [booking];
                filterAndDisplay();
            });
        } else {
            API.bookings.getUserBookings(function(error, bookings) {
                if (!error) allBookings = bookings;
                filterAndDisplay();
            });
        }
    }

    function filterAndDisplay() {
        let filtered = allBookings, now = new Date();
        if (currentFilter === 'CONFIRMED') filtered = allBookings.filter(b => b.status === 'CONFIRMED');
        else if (currentFilter === 'CANCELLED') filtered = allBookings.filter(b => b.status === 'CANCELLED');
        else if (currentFilter === 'upcoming') filtered = allBookings.filter(b => new Date(b.showDate) > now && b.status === 'CONFIRMED');
        else if (currentFilter === 'past') filtered = allBookings.filter(b => new Date(b.showDate) < now);
        displayBookings(filtered);
    }

    function displayBookings(bookings) {
        if (bookings.length === 0) { $('#bookingsList').html('<div class="text-center py-5"><i class="fas fa-ticket-alt fa-4x text-secondary"></i><h5 class="mt-3">No bookings found</h5><a href="movies.html" class="btn btn-primary mt-2">Browse Movies</a></div>'); return; }
        $('#bookingsList').html(bookings.map(b => `<div class="booking-card"><div class="booking-header"><div class="d-flex justify-content-between"><div><i class="fas fa-film text-primary"></i> <strong class="text-white fs-5">${escapeHtml(b.movieTitle)}</strong></div><span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span></div></div>
        <div class="booking-body"><div class="row"><div class="col-md-3"><i class="fas fa-calendar-alt text-primary"></i> ${formatDate(b.showDate)}</div><div class="col-md-3"><i class="fas fa-clock text-primary"></i> ${b.showTime}</div><div class="col-md-3"><i class="fas fa-chair text-primary"></i> ${b.seatNumbers.join(', ')}</div><div class="col-md-3"><i class="fas fa-money-bill-wave text-primary"></i> ${formatCurrency(b.totalAmount)}</div></div>
        <div class="d-flex gap-2 mt-3"><button class="btn btn-sm btn-outline-primary" onclick="showQR('${b.qrCode}','${b.bookingReference}','${b.movieTitle}','${b.showDate}','${b.showTime}','${b.seatNumbers.join(',')}')"><i class="fas fa-qrcode"></i> Show Ticket</button>
        ${b.status === 'CONFIRMED' ? `<button class="btn btn-sm btn-outline-danger" onclick="cancelBooking(${b.id})"><i class="fas fa-times"></i> Cancel</button>` : ''}
        <button class="btn btn-sm btn-outline-info" onclick="location.href='feedback.html?movieId=${b.movieId}'"><i class="fas fa-star"></i> Rate</button></div></div></div>`).join(''));
    }

    function showQR(qr, ref, movie, date, time, seats) {
        $('#qrImage').attr('src', `data:image/png;base64,${qr}`);
        $('#qrRef').text(`Booking: ${ref}`);
        $('#qrMovie').text(movie); $('#qrDate').text(formatDate(date)); $('#qrTime').text(time); $('#qrSeats').text(seats);
        new bootstrap.Modal(document.getElementById('qrModal')).show();
    }

    function cancelBooking(id) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;
        API.bookings.cancel(id, function(error) {
            if (error) showToast(error.message || 'Failed to cancel', 'error');
            else { showToast('Booking cancelled', 'success'); loadBookings(); }
        });
    }

    $('.filter-btn').on('click', function() { $('.filter-btn').removeClass('active'); $(this).addClass('active'); currentFilter = $(this).data('filter'); filterAndDisplay(); });
    loadBookings();
</script>
</body>
</html>
